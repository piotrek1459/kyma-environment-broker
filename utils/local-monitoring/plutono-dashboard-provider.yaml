apiVersion: v1
kind: ConfigMap
metadata:
  name: plutono-dashboard-provider
  namespace: monitoring
data:
  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: "default"
        orgId: 1
        folder: ""
        type: file
        disableDeletion: false
        editable: true
        updateIntervalSeconds: 10
        options:
          path: /var/lib/plutono/dashboards
          foldersFromFilesStructure: false
