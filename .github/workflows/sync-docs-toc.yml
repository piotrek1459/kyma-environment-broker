name: Sync KEB docs structure to product-kyma-runtime

# Triggered after a successful "Promote KEB to dev" run (i.e. after every KEB release).
# Compares docs/ between the released KEB version and the previous one.
# Only files with <!--{"metadata":{"publish":true}}--> are considered.
#
# Two structural changes are handled:
#   1. A new .md file with publish:true was added → add it to operations-keb in toc.yaml
#   2. A published .md file was renamed            → update the filename in toc.yaml
#
# The resulting PR to product-kyma-runtime carries:
#   - title:  docs(keb): sync doc structure changes [chart@<CHART_VERSION>]
#   - label:  keb-docs-update-<CHART_VERSION>

env:
  PRODUCT_RUNTIME_REPO_URL: "https://${{ vars.GH_TOOLS_HOST }}/kyma/${{ vars.PK_RUNTIME_REPO_NAME }}"
  PRODUCT_RUNTIME_CLONE_URL: "https://${{ vars.GIT_USER_NAME }}:${{ secrets.BOT_TOKEN_GITHUB_TOOLS }}@${{ vars.GH_TOOLS_HOST }}/kyma/${{ vars.PK_RUNTIME_REPO_NAME }}.git"
  MGMT_CHARTS_CLONE_URL: "https://${{ vars.GIT_USER_NAME }}:${{ secrets.BOT_TOKEN_GITHUB_TOOLS }}@${{ vars.GH_TOOLS_HOST }}/kyma/management-plane-charts.git"
  GH_ENTERPRISE_TOKEN: ${{ secrets.BOT_TOKEN_GITHUB_TOOLS }}

on:
  workflow_run:
    workflows: ["Promote KEB to dev"]
    types: [completed]
  workflow_dispatch:
    inputs:
      keb_version:
        description: "KEB version tag to use as HEAD (e.g. 1.29.0)"
        required: true

jobs:
  sync-toc:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Guard – only run on successful promote
        if: >
          github.event_name == 'workflow_run' &&
          github.event.workflow_run.conclusion != 'success'
        run: |
          echo "Upstream workflow did not succeed (conclusion: ${{ github.event.workflow_run.conclusion }}). Skipping."
          exit 0

      - name: Validate required variables
        run: |
          [ -z "${{ vars.GIT_USER_EMAIL }}" ]      && echo "GIT_USER_EMAIL is required"      && exit 1
          [ -z "${{ vars.GIT_USER_NAME }}" ]       && echo "GIT_USER_NAME is required"       && exit 1
          [ -z "${{ vars.GH_TOOLS_HOST }}" ]       && echo "GH_TOOLS_HOST is required"       && exit 1
          [ -z "${{ vars.PK_RUNTIME_REPO_NAME }}" ] && echo "PK_RUNTIME_REPO_NAME is required" && exit 1
          echo "Validated"

      - name: Checkout KEB
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || '' }}

      - name: Resolve KEB versions
        id: versions
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            CURRENT_TAG="${{ inputs.keb_version }}"
          else
            CURRENT_TAG=$(git describe --tags --exact-match "${{ github.event.workflow_run.head_sha }}" 2>/dev/null || true)
            if [ -z "$CURRENT_TAG" ]; then
              echo "No exact tag found on head_sha – nothing to sync."
              exit 0
            fi
          fi

          PREV_TAG=$(git describe --tags --abbrev=0 "${CURRENT_TAG}^")

          echo "CURRENT_TAG=${CURRENT_TAG}" >> "$GITHUB_OUTPUT"
          echo "PREV_TAG=${PREV_TAG}"       >> "$GITHUB_OUTPUT"
          echo "Current: ${CURRENT_TAG}  Previous: ${PREV_TAG}"

      - name: Detect structural changes in docs/
        id: detect
        run: |
          CURRENT_TAG="${{ steps.versions.outputs.CURRENT_TAG }}"
          PREV_TAG="${{ steps.versions.outputs.PREV_TAG }}"

          # Added files with publish:true
          git diff --diff-filter=A --name-only "${PREV_TAG}" "${CURRENT_TAG}" -- 'docs/**/*.md' \
            | grep -v '^docs/assets/' \
            | while IFS= read -r f; do
                git show "${CURRENT_TAG}:${f}" 2>/dev/null \
                  | head -3 \
                  | grep -q '<!--{"metadata":{"publish":true}}-->' \
                  && echo "$f"
              done > /tmp/added_files.txt || true

          # Renamed files where at least one end has publish:true
          git diff -M --diff-filter=R --name-status "${PREV_TAG}" "${CURRENT_TAG}" -- 'docs/**/*.md' \
            | grep -v 'docs/assets/' \
            | while IFS= read -r line; do
                old=$(echo "$line" | awk '{print $2}')
                new=$(echo "$line" | awk '{print $3}')
                old_pub=$(git show "${PREV_TAG}:${old}" 2>/dev/null | head -3 | grep -c '<!--{"metadata":{"publish":true}}-->' || true)
                new_pub=$(git show "${CURRENT_TAG}:${new}" 2>/dev/null | head -3 | grep -c '<!--{"metadata":{"publish":true}}-->' || true)
                [ "$old_pub" -gt 0 ] || [ "$new_pub" -gt 0 ] && echo "$line"
              done > /tmp/renamed_files.txt || true

          echo "=== Added (publish:true) ==="
          cat /tmp/added_files.txt
          echo "=== Renamed (publish:true on either end) ==="
          cat /tmp/renamed_files.txt

          if [ -s /tmp/added_files.txt ] || [ -s /tmp/renamed_files.txt ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No structural doc changes detected – nothing to sync."
          fi

      - name: Resolve chart version
        id: chart
        if: steps.detect.outputs.has_changes == 'true'
        run: |
          CURRENT_TAG="${{ steps.versions.outputs.CURRENT_TAG }}"
          git clone --depth 1 --branch "keb-${CURRENT_TAG}" ${MGMT_CHARTS_CLONE_URL} mgmt-charts 2>/dev/null || \
            git clone --depth 1 ${MGMT_CHARTS_CLONE_URL} mgmt-charts
          CHART_VERSION=$(grep '^version:' mgmt-charts/keb-sap/Chart.yaml | awk '{print $2}')
          echo "CHART_VERSION=${CHART_VERSION}" >> "$GITHUB_OUTPUT"
          echo "Chart version: ${CHART_VERSION}"

      - name: Setup git
        if: steps.detect.outputs.has_changes == 'true'
        run: |
          git config --global user.email "${{ vars.GIT_USER_EMAIL }}"
          git config --global user.name "${{ vars.GIT_USER_NAME }}"

      - name: Clone product-kyma-runtime
        if: steps.detect.outputs.has_changes == 'true'
        run: git clone ${PRODUCT_RUNTIME_CLONE_URL} product-kyma-runtime

      - name: Update toc.yaml
        if: steps.detect.outputs.has_changes == 'true'
        run: |
          python3 scripts/python/update_toc.py \
            --toc     product-kyma-runtime/docs/toc.yaml \
            --added   /tmp/added_files.txt \
            --renamed /tmp/renamed_files.txt

      - name: Commit and push
        if: steps.detect.outputs.has_changes == 'true'
        id: push
        working-directory: product-kyma-runtime
        run: |
          BRANCH_NAME="keb-docs-sync-${GITHUB_SHA:0:8}"
          echo "BRANCH_NAME=${BRANCH_NAME}" >> "$GITHUB_ENV"
          git checkout -B "${BRANCH_NAME}"
          git add docs/toc.yaml
          git commit -m "docs(keb): sync doc structure changes to toc.yaml

          Triggered by kyma-environment-broker@${GITHUB_SHA}"
          git remote set-url origin ${PRODUCT_RUNTIME_CLONE_URL}
          git push origin "${BRANCH_NAME}"

      - name: Create PR
        if: steps.detect.outputs.has_changes == 'true'
        working-directory: product-kyma-runtime
        env:
          GH_HOST: ${{ vars.GH_TOOLS_HOST }}
        run: |
          CHART_VERSION="${{ steps.chart.outputs.CHART_VERSION }}"

          # Skip if PR already exists for this branch
          prs=$(gh pr list \
            -R "${PRODUCT_RUNTIME_REPO_URL}" \
            -A "${{ vars.GIT_USER_NAME }}" \
            --state open \
            --json headRefName \
            | jq -r '.[] | .headRefName')

          if echo "$prs" | tr " " '\n' | grep -F -q -x "${BRANCH_NAME}"; then
            echo "PR already exists – skipping creation."
            exit 0
          fi

          ADDED_LIST=$(sed 's/^/- /' /tmp/added_files.txt)
          [ -z "$ADDED_LIST" ] && ADDED_LIST="_none_"
          RENAMED_LIST=$(awk -F'\t' '{print "- `" $2 "` → `" $3 "`"}' /tmp/renamed_files.txt)
          [ -z "$RENAMED_LIST" ] && RENAMED_LIST="_none_"

          printf '## Automated sync from kyma-environment-broker\n\nThis PR was created automatically after structural changes were detected\nin the `docs/` directory of kyma-environment-broker.\n\n**KEB version:** `%s`  **Chart version:** `%s`\n\n### Added files\n%s\n\n### Renamed files\n%s\n\n> [!NOTE]\n> New entries are placed by numeric prefix order.\n> Please review their position in `toc.yaml` and adjust nesting if needed.\n' \
            "${{ steps.versions.outputs.CURRENT_TAG }}" "${CHART_VERSION}" "${ADDED_LIST}" "${RENAMED_LIST}" \
            > /tmp/pr_body.md

          PR_URL=$(gh pr create \
            -B main \
            -H "${BRANCH_NAME}" \
            -R "${PRODUCT_RUNTIME_REPO_URL}" \
            --title "docs(keb): sync doc structure changes [chart@${CHART_VERSION}]" \
            --body-file /tmp/pr_body.md)

          echo "${PR_URL}" | tee "$GITHUB_STEP_SUMMARY"

          # Add label (create it first if it doesn't exist)
          LABEL="keb-docs-update-${CHART_VERSION}"
          gh label create "${LABEL}" \
            -R "${PRODUCT_RUNTIME_REPO_URL}" \
            --color "0075ca" \
            --description "Automated KEB doc sync for chart ${CHART_VERSION}" \
            2>/dev/null || true

          PR_NUMBER=$(echo "${PR_URL}" | grep -oE '[0-9]+$')
          gh pr edit "${PR_NUMBER}" \
            -R "${PRODUCT_RUNTIME_REPO_URL}" \
            --add-label "${LABEL}"
