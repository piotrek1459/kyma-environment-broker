version: "2"

run:
  allow-parallel-runners: true
  timeout: 2m

issues:
  max-issues-per-linter: 0
  max-same-issues: 0

linters:
  default: none
  enable:
    - errcheck    # Check for unchecked errors
    - govet       # Go's built-in static analyzer
    - bodyclose   # Check whether HTTP response bodies are closed
    - misspell    # Detect commonly misspelled words
    - goconst     # Find repeated strings that could be replaced by a constant
    - unconvert   # Detect redundant type conversions
    - unused      # Detect unused constants, variables, functions and types
    - cyclop      # Check code complexity
    - staticcheck # Check set of rules from staticcheck
    - gosec       # Check for security issues
  settings:
    unused:
      field-writes-are-uses: false # Mark all struct fields that have been written to as used.
    cyclop:
      max-complexity: 30
    gosec:
      excludes:
        - G101 # False positives on variable names containing "Secret" (resource names, not credentials)
        - G115 # Integer overflow int->int32 (values are validated and within range)
        - G204 # Subprocess injection (script paths from known source code locations)
        - G304 # File inclusion via variable (paths from server configuration, not user input)
        - G404 # Weak random generator (math/rand used only in tests)
    staticcheck:
      checks:
        - "all"
        - "-QF1008" # Omit embedded fields from selector expression.
        - "-ST1000" # Incorrect or missing package comment.
        - "-ST1005" # Incorrectly formatted error string.
        - "-ST1003" # Poorly chosen identifier.
formatters:
  enable:
    - goimports
    - gofmt