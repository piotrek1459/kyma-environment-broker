<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>KEB Analytics</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <style>
    body { font-family: sans-serif; margin: 2rem; }
    .chart-container { max-width: 800px; margin: 2rem 0; }
    #error { color: red; }
    #controls { display: flex; align-items: center; gap: 1rem; margin-bottom: 1rem; flex-wrap: wrap; }
    #controls label { font-weight: bold; }
    #refresh-btn { padding: 0.3rem 0.9rem; cursor: pointer; font-size: 0.95rem; }
    #refresh-btn:disabled { opacity: 0.5; cursor: default; }
    .tab-btn {
      padding: 0.5rem 1.2rem;
      border: none;
      border-bottom: 3px solid transparent;
      background: none;
      cursor: pointer;
      font-size: 0.95rem;
      color: #555;
      margin-bottom: -2px;
    }
    .tab-btn.active {
      color: #0070f3;
      border-bottom-color: #0070f3;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <h1>KEB Parameter Usage Analytics</h1>

  <div id="controls">
    <label for="period">Period:</label>
    <select id="period">
      <option value="7">Last 7 days</option>
      <option value="30">Last 30 days</option>
      <option value="90">Last 90 days</option>
      <option value="">All time</option>
    </select>

    <label for="plan">Plan:</label>
    <select id="plan">
      <option value="">All plans</option>
    </select>

    <label for="region">Region:</label>
    <select id="region">
      <option value="">All regions</option>
    </select>

    <button id="refresh-btn">Refresh</button>
  </div>

  <p id="total"></p>
  <p id="error"></p>

  <div id="tab-bar" style="display:flex;gap:0;border-bottom:2px solid #ccc;margin-bottom:1rem">
    <button class="tab-btn active" data-tab="provisioning">Provisioning</button>
    <button class="tab-btn"        data-tab="update">Update</button>
    <button class="tab-btn"        data-tab="combined">Combined</button>
    <button class="tab-btn"        data-tab="distribution">Value Distribution</button>
  </div>

  <div id="tab-provisioning" class="tab-pane">
    <div class="chart-container"><canvas id="provChart"></canvas></div>
  </div>

  <div id="tab-update" class="tab-pane" style="display:none">
    <p id="update-total"></p>
    <div class="chart-container"><canvas id="updateChart"></canvas></div>
  </div>

  <div id="tab-combined" class="tab-pane" style="display:none">
    <div class="chart-container"><canvas id="combinedChart"></canvas></div>
  </div>

  <div id="tab-distribution" class="tab-pane" style="display:none">
    <div id="dist-controls" style="display:flex;align-items:center;gap:1rem;margin-bottom:1rem">
      <label for="distParam" style="font-weight:bold">Parameter:</label>
      <select id="distParam"></select>
    </div>
    <div class="chart-container"><canvas id="distChart"></canvas></div>
  </div>

  <script>
    const charts = [];
    let currentData = null; // last fetched StatsResponse (full, unfiltered by plan/region)
    let activeTab = 'provisioning';

    function destroyCharts() {
      charts.forEach(c => c.destroy());
      charts.length = 0;
    }

    function buildUrl() {
      const days = document.getElementById('period').value;
      const plan = document.getElementById('plan').value;
      const region = document.getElementById('region').value;
      let url = '/api/stats';
      const params = [];
      if (days) {
        const from = new Date();
        from.setUTCDate(from.getUTCDate() - parseInt(days));
        params.push('from=' + from.toISOString().slice(0, 10));
      }
      if (plan)   params.push('plan='   + encodeURIComponent(plan));
      if (region) params.push('region=' + encodeURIComponent(region));
      if (params.length) url += '?' + params.join('&');
      return url;
    }

    function populatePlanDropdown(plans) {
      const sel = document.getElementById('plan');
      const current = sel.value;
      sel.innerHTML = '<option value="">All plans</option>';
      (plans || []).forEach(p => {
        const opt = document.createElement('option');
        opt.value = p;
        opt.textContent = p;
        if (p === current) opt.selected = true;
        sel.appendChild(opt);
      });
    }

    function populateRegionDropdown(regionsByPlan, selectedPlan) {
      const sel = document.getElementById('region');
      const current = sel.value;
      const regions = (regionsByPlan || {})[selectedPlan] || (regionsByPlan || {})[''] || [];
      sel.innerHTML = '<option value="">All regions</option>';
      regions.forEach(r => {
        const opt = document.createElement('option');
        opt.value = r;
        opt.textContent = r;
        if (r === current) opt.selected = true;
        sel.appendChild(opt);
      });
    }

    function renderBar(canvasId, stats) {
      if (!stats || !stats.parameters || stats.parameters.length === 0) return;
      const labels = stats.parameters.map(p =>
        p.total > 0
          ? p.parameter + '  (' + p.set_count + ')'
          : p.parameter
      );
      const pct = stats.parameters.map(p =>
        p.total > 0 ? ((p.set_count / p.total) * 100).toFixed(1) : 0
      );
      const chart = new Chart(document.getElementById(canvasId), {
        type: 'bar',
        data: {
          labels,
          datasets: [{ label: '% instances with parameter set', data: pct,
            backgroundColor: 'rgba(54,162,235,0.6)' }]
        },
        options: { indexAxis: 'y', scales: { x: { max: 100 } } }
      });
      charts.push(chart);
    }

    // mergeStats merges two ParameterStats objects into one.
    // Parameters present in both have set_count and total summed.
    // Result is sorted by descending set_count, then alphabetically.
    function mergeStats(prov, upd) {
      const map = {};
      function absorb(stats) {
        (stats.parameters || []).forEach(p => {
          if (!map[p.parameter]) map[p.parameter] = { set_count: 0, total: 0 };
          map[p.parameter].set_count += p.set_count;
          map[p.parameter].total    += p.total;
        });
      }
      absorb(prov);
      absorb(upd);
      const parameters = Object.entries(map)
        .map(([parameter, v]) => ({ parameter, set_count: v.set_count, total: v.total }))
        .sort((a, b) =>
          b.set_count !== a.set_count
            ? b.set_count - a.set_count
            : a.parameter.localeCompare(b.parameter)
        );
      return { parameters };
    }

    function populateDistParam(distributions) {
      const sel = document.getElementById('distParam');
      const current = sel.value;
      sel.innerHTML = '';
      (distributions || []).forEach(d => {
        const opt = document.createElement('option');
        opt.value = d.parameter;
        opt.textContent = d.parameter;
        if (d.parameter === current) opt.selected = true;
        sel.appendChild(opt);
      });
      // Default to first if previous selection no longer exists
      if (!sel.value && distributions && distributions.length) {
        sel.value = distributions[0].parameter;
      }
    }

    function renderDistTab(data) {
      populateDistParam(data.distributions);
      const sel = document.getElementById('distParam');
      const chosen = sel.value;
      const dist = (data.distributions || []).find(d => d.parameter === chosen);
      if (!dist) return;

      const labels = Object.keys(dist.values);
      const vals   = Object.values(dist.values);
      const chart  = new Chart(document.getElementById('distChart'), {
        type: 'bar',
        data: {
          labels,
          datasets: [{ label: 'count', data: vals,
            backgroundColor: 'rgba(255,159,64,0.6)' }]
        },
        options: { scales: { y: { ticks: { stepSize: 1, precision: 0 } } } }
      });
      charts.push(chart);
    }

    function renderActiveTab(data) {
      destroyCharts();
      document.getElementById('error').textContent = '';
      document.getElementById('total').textContent =
        'Total active instances: ' + data.total_instances;

      if (activeTab === 'provisioning') {
        renderBar('provChart', data.provisioning);
      } else if (activeTab === 'update') {
        const updateTotal = (data.updates.parameters && data.updates.parameters.length > 0)
          ? data.updates.parameters[0].total : 0;
        document.getElementById('update-total').textContent =
          'Total update operations: ' + updateTotal;
        renderBar('updateChart', data.updates);
      } else if (activeTab === 'combined') {
        renderBar('combinedChart', mergeStats(data.provisioning, data.updates));
      } else if (activeTab === 'distribution') {
        renderDistTab(data);
      }
    }

    function switchTab(name) {
      activeTab = name;
      document.querySelectorAll('.tab-pane').forEach(p => p.style.display = 'none');
      document.getElementById('tab-' + name).style.display = '';
      document.querySelectorAll('.tab-btn').forEach(b => {
        b.classList.toggle('active', b.dataset.tab === name);
      });
      if (name !== 'update') document.getElementById('update-total').textContent = '';
      if (currentData) renderActiveTab(currentData);
    }

    document.getElementById('tab-bar').addEventListener('click', e => {
      const btn = e.target.closest('.tab-btn');
      if (btn) switchTab(btn.dataset.tab);
    });

    document.getElementById('distParam').addEventListener('change', () => {
      if (currentData) {
        destroyCharts();
        renderDistTab(currentData);
      }
    });

    async function load() {
      document.getElementById('error').textContent = '';
      let data;
      try {
        const resp = await fetch(buildUrl());
        data = await resp.json();
      } catch(e) {
        document.getElementById('error').textContent = 'Failed to load stats: ' + e;
        return;
      }
      currentData = data;

      // Always repopulate plan dropdown from fresh data.
      populatePlanDropdown(data.plans);

      // Repopulate region dropdown for currently selected plan.
      const selectedPlan = document.getElementById('plan').value;
      populateRegionDropdown(data.regions_by_plan, selectedPlan);

      renderActiveTab(data);
    }

    function onPlanChange() {
      // Update region dropdown to match selected plan, then re-fetch.
      if (currentData) {
        populateRegionDropdown(currentData.regions_by_plan, document.getElementById('plan').value);
        // Reset region to "All regions" when plan changes.
        document.getElementById('region').value = '';
      }
      load();
    }

    document.getElementById('period').addEventListener('change', load);
    document.getElementById('plan').addEventListener('change', onPlanChange);
    document.getElementById('region').addEventListener('change', load);
    document.getElementById('refresh-btn').addEventListener('click', async () => {
      const btn = document.getElementById('refresh-btn');
      btn.disabled = true;
      btn.textContent = 'Refreshing…';
      try {
        await fetch('/api/refresh', { method: 'POST' });
      } catch(e) {
        document.getElementById('error').textContent = 'Refresh failed: ' + e;
      }
      await load();
      btn.disabled = false;
      btn.textContent = 'Refresh';
    });
    load();
  </script>
</body>
</html>
